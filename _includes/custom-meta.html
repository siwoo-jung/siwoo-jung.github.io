<!-- Custom Meta Tags for SEO -->
{% if page.layout == 'post' %}
  <!-- Canonical URL -->
  <link rel="canonical" href="{{ page.url | absolute_url }}" />
  
  <!-- Additional Open Graph tags -->
  <meta property="og:type" content="article" />
  <meta property="og:title" content="{{ page.title | escape }}" />
  <meta property="og:description" content="{{ page.description | escape }}" />
  <meta property="og:url" content="{{ page.url | absolute_url }}" />
  <meta property="og:site_name" content="{{ site.title }}" />
  
  <!-- Article specific meta tags -->
  <meta property="article:published_time" content="{{ page.date | date_to_xmlschema }}" />
  {% if page.last_modified_at %}
  <meta property="article:modified_time" content="{{ page.last_modified_at | date_to_xmlschema }}" />
  {% endif %}
  <meta property="article:author" content="Siwoo Jung" />
  
  <!-- Twitter Card tags -->
  <meta name="twitter:title" content="{{ page.title | escape }}" />
  <meta name="twitter:description" content="{{ page.description | escape }}" />
  <meta name="twitter:creator" content="@siwoojung" />
{% else %}
  <!-- For non-post pages -->
  <link rel="canonical" href="{{ page.url | absolute_url }}" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="{% if page.title %}{{ page.title | escape }}{% else %}{{ site.title }}{% endif %}" />
  <meta property="og:description" content="{% if page.description %}{{ page.description | escape }}{% else %}{{ site.description }}{% endif %}" />
  <meta property="og:url" content="{{ page.url | absolute_url }}" />
  <meta property="og:site_name" content="{{ site.title }}" />
{% endif %}
